<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{{ code }} Error — Aletheia</title>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    .error-page { display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;text-align:center;gap:1.5rem; }
    .error-code { font-family:'JetBrains Mono',monospace;font-size:6rem;font-weight:700;color:var(--fake);line-height:1; }
    .error-msg  { font-size:1.3rem;color:var(--text-muted);max-width:480px; }
  </style>
    <!-- Clarity tracking code for https://aletheia-k1os.onrender.com/ -->
    <script type="text/javascript">
        (function(c,l,a,r,i,t,y){
            c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
            t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
            y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
        })(window, document, "clarity", "script", "w35a5rh74y");
    </script>
</head>
<body>
  <div class="app-container">
    <div class="error-page">
      <div class="error-code">{{ code }}</div>
      <div class="error-msg">{{ message }}</div>
      <a href="/" class="primary-btn" style="display:inline-block;padding:0.9rem 2rem;text-decoration:none;margin-top:1rem;">← Back to Home</a>
    </div>
  </div>
  <script>
    if (localStorage.getItem('darkMode') === 'true') document.body.classList.add('dark');
  </script>
</body>
</html>
